# All configuration is sourced from .env — nothing is hardcoded here.
# Compose interpolates ${VARS} from ./.env; containers receive their full
# environment via `env_file: .env`.
services:
  # ── Redis: Celery broker + result backend ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uchenab-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: uchenab-backend:latest
    container_name: uchenab-api
    command: ["python", "-m", "uvicorn", "agent.api:app", "--host", "${APP_HOST:-0.0.0.0}", "--port", "${APP_PORT:-8058}"]
    ports:
      - "${APP_PORT:-8058}:${APP_PORT:-8058}"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(f\"http://127.0.0.1:{os.getenv('APP_PORT','8058')}/api/v1/health\")"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery worker: ingestion + WhatsApp/voice processing ───────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: uchenab-backend:latest
    container_name: uchenab-worker
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "--loglevel=${LOG_LEVEL:-info}", "-Q", "ingestion,messaging", "--concurrency=${CELERY_CONCURRENCY:-4}"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Celery beat: periodic ingestion scheduler ──────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: uchenab-backend:latest
    container_name: uchenab-beat
    command: ["celery", "-A", "worker.celery_app:celery_app", "beat", "--loglevel=${LOG_LEVEL:-info}"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
